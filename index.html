<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @variant dark (&:where(.dark, .dark *));
    </style>
  </head>
  <body class="dark:bg-gray-800 ">
    <!-- container -->
    <div class="bg-gray-50 dark:bg-gray-900">
      <!-- top bar -->
      <div class="h-25 md:h-16 p-4 py-4 md:p-3 border-b border-gray-200 dark:border-gray-700 dark:bg-gray-800 shadow-sm">
        <div class="flex items-center justify-between h-16 max-w-6xl mx-auto">
          <h3 class="text-lg md:text-2xl font-bold dark:text-white">Where in the world?</h3>
          <!-- theme toggle -->
        <div class="theme-toggle flex items-center justify-center gap-2 cursor-pointer">
         <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 cursor-pointer dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
  <!-- paste the path here -->
  <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
</svg>
            <span class="cursor-pointer dark:text-white text-gray-500">
              Dark Mode</span
            >
          </div>
        </div>
      </div>
      <!-- main content -->
      <div class="app max-w-6xl mx-auto mt-10">
        <div class="countryLists">
            <div id="filter" class="flex flex-col md:flex-row items-start md:items-center md:justify-between space-y-4 md:space-y-0 px-4 md:px-0">
              <input
                type="text"
                id="textInput"
                class="textInput px-4 py-2 border border-gray-200 rounded-md w-90 bg-white"
                placeholder="Search for a country..."
              />
              <select
                name="filterByRegion"
                id="filterByRegion"
                class="filterByRegion px-4 py-2 border border-gray-200 rounded-md bg-white"
              >
                <option value="all">Filter by Region</option>
                <option value="africa">Africa</option>
                <option value="americas">America</option>
                <option value="asia">Asia</option>
                <option value="europe">Europe</option>
                <option value="oceania">Oceania</option>
              </select>
            </div>
            <div
              id="countries"
              class="countries grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mt-10 px-5 md:px-0"
            >
              <div id="country" class="country w-full bg-white flex flex-col shadow-md cursor-pointer">
                <!-- image -->
                <img
                  src=""
                  alt=""
                  class="flag w-full w-50 h-50"
                />
                <!-- content -->
                <div class="p-4">
                  <h3 class="name text-xl font-bold mb-2"></h3>
                  <p class="population text-gray-500"></p>
                  <p class="region text-gray-500"></p>
                  <p class="capital text-gray-500"></p>
              </div>
            </div>
          </div>
        </div>

      <!-- single country -->
    <div class="singleCountry hidden flex flex-col p-10 space-y-16 min-h-screen bg-white dark:bg-gray-900 text-gray-900 dark:text-white">
    <button class="back flex items-center gap-2 px-8 py-2 rounded-sm shadow-md border-none bg-white dark:bg-gray-800 cursor-pointer w-fit">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="size-6 bg-black dark:bg-white">
  <path strokeLinecap="round" strokeLinejoin="round" d="M6.75 15.75 3 12m0 0 3.75-3.75M3 12h18" />
</svg>
 Back
    </button>

    <div class="singleCountryContent flex flex-col lg:flex-row items-center lg:items-start gap-12 lg:gap-24">
        
        <div class="flex-1 w-full max-w-[600px]">
            <img src="" alt="" class="flag w-full h-auto object-cover shadow-sm" />
        </div>

        <div class="flex-1 py-10">
            <h3 class="name text-3xl font-extrabold mb-8"></h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3 mb-10">
                <p class="font-semibold">Native Name: <span class="nativeName font-light"></span></p>
                <p class="font-semibold">Top Level Domain: <span class="domain font-light"></span></p>
                <p class="font-semibold">Population: <span class="population font-light"></span></p>
                <p class="font-semibold">Currencies: <span class="currency font-light"></span></p>
                <p class="font-semibold">Region: <span class="region font-light"></span></p>
                <p class="font-semibold">Languages: <span class="language font-light"></span></p>
                <p class="font-semibold">Sub Region: <span class="subregion font-light"></span></p>
                <p class="font-semibold">Capital: <span class="capital font-light"></span></p>
            </div>

        </div>
    </div>
</div>
 <script src="index.js"></script>
  </body>
</html>
